<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Forms — Shàn Examples</title>
  <link rel="stylesheet" href="common.css"/>
  <link rel="stylesheet" href="forms.css"/>
</head>
<body>
  <nav class="site-nav">
    <a class="brand" href="index.html">← Gallery</a>
    <a href="tables.html">Tables</a>
  </nav>
  <main class="page">
    <h1>Forms</h1>
    <p class="lead">Styled inputs and buttons. Submit uses native form (no JavaScript).</p>

    <form class="fan-form" action="#" method="get">
      <fieldset>
        <legend>Open a room</legend>
        <label for="room">Room</label>
        <select id="room" name="room">
          <option value="keys">keys</option>
          <option value="files">files</option>
          <option value="net">net</option>
        </select>

        <label for="why">Why (audit reason)</label>
        <input type="text" id="why" name="why" placeholder="e.g. load-config"/>

        <label for="uses">Secret uses remaining</label>
        <input type="number" id="uses" name="uses" min="1" max="10" value="3"/>

        <label class="check">
          <input type="checkbox" name="strict" checked="checked"/>
          Strict room checks
        </label>

        <label class="check">
          <input type="radio" name="logic" value="half" checked="checked"/>
          Half (&#189;)
        </label>
        <label class="check">
          <input type="radio" name="logic" value="yes"/>
          Yes
        </label>

        <button type="submit">Submit (GET demo)</button>
      </fieldset>
    </form>
  </main>
  <footer class="site-footer"><a href="index.html">All examples</a></footer>
</body>
</html>
