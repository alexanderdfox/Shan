<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Span decay — Shàn Examples</title>
  <link rel="stylesheet" href="common.css"/>
  <link rel="stylesheet" href="span-decay.css"/>
</head>
<body>
  <nav class="site-nav">
    <a class="brand" href="index.html">← Gallery</a>
    <a href="fan-rooms.html">Rooms</a>
  </nav>
  <main class="page">
    <h1>Span decay</h1>
    <p class="lead">Each <code>observe</code> shortens the secret — “1 gets shorter.”</p>

    <ol class="decay-steps">
      <li>
        <span class="step-label">Start</span>
        <span class="bar full" title="span 100%"></span>
        <span class="pct">100%</span>
      </li>
      <li>
        <span class="step-label">1st observe</span>
        <span class="bar high"></span>
        <span class="pct">90%</span>
      </li>
      <li>
        <span class="step-label">2nd observe</span>
        <span class="bar mid"></span>
        <span class="pct">81%</span>
      </li>
      <li>
        <span class="step-label">3rd observe</span>
        <span class="bar low"></span>
        <span class="pct">73%</span>
      </li>
      <li>
        <span class="step-label">uses=0</span>
        <span class="bar empty"></span>
        <span class="pct">closed</span>
      </li>
    </ol>

    <pre class="shan-snippet"><code>&lt;secret name="apiKey" uses="3"&gt;sk_...&lt;/secret&gt;
&lt;observe name="apiKey" why="read" /&gt;</code></pre>
  </main>
  <footer class="site-footer"><a href="index.html">All examples</a></footer>
</body>
</html>
